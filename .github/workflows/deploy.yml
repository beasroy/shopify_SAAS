name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Amazon Linux
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            APP_DIR=/home/ec2-user/shopify_SAAS

            echo "=== Updating repository ==="
            cd $APP_DIR

            git fetch origin
            git reset --hard origin/main

            echo "=== Installing backend dependencies ==="
            cd server
            npm install
            cd ..

            echo "=== Restarting PM2 ==="
            pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js

            echo "=== Updating frontend ==="

            NGINX_WEB_ROOT="/usr/share/nginx/html"

            sudo mkdir -p $NGINX_WEB_ROOT

            if [ -d "$APP_DIR/client/dist" ]; then
              sudo rsync -av --delete "$APP_DIR/client/dist/" "$NGINX_WEB_ROOT/"
            else
              echo "client/dist not found."
              exit 1
            fi

            sudo systemctl reload nginx

            echo "✅ Deployment successful"